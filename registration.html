<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Registration Page</title>
</head>
<body>
    <h1>Registration Form</h1>

    <form>
        <label for="fname">First name: </label>
        <input type="text", id="fname", name="fname", placeholder="Enter your First Name."><br>

        <label for="lname">Last name: </label>
        <input type="text", id="lname", name="lname", placeholder="Enter your Last Name."><br>

        <label for="user-email">Email Address: </label>
        <input type="email", id="user-email", name="user-email" placeholder="example@gmail.com"><br>

        <fieldset>
            <legend>Address</legend>
          
            <label for="street">Street Address:</label>
            <input type="text" id="street" name="street" maxlength="40"> <br>
          
            <label for="city">City/Town:</label>
            <input type="text" id="city" name="city" maxlength="20"> <br>
          
            <label for="state">State:</label>
            <select id="state" name="state">
              <option value="">--Select State--</option>
              <option value="Johor">Johor</option>
              <option value="Kedah">Kedah</option>
              <option value="Kelantan">Kelantan</option>
              <option value="Melaka">Melaka</option>
              <option value="Negeri Sembilan">Negeri Sembilan</option>
              <option value="Pahang">Pahang</option>
              <option value="Perak">Perak</option>
              <option value="Perlis">Perlis</option>
              <option value="Pulau Pinang">Pulau Pinang</option>
              <option value="Sabah">Sabah</option>
              <option value="Sarawak">Sarawak</option>
              <option value="Selangor">Selangor</option>
              <option value="Terengganu">Terengganu</option>
              <option value="Kuala Lumpur">W.P. Kuala Lumpur</option>
              <option value="Labuan">W.P. Labuan</option>
              <option value="Putrajaya">W.P. Putrajaya</option>
            </select> <br>
          
            <label for="postcode">Postcode:</label>
            <input type="text" id="postcode" name="postcode" pattern="\d{5}" title="Please enter exactly 5 digits" maxlength="5">
        </fieldset>

        <label for="phone"> Phone Number: </label>
        <input type="tel", id="phone" name="phone" placeholder="012-3456789"> <br>

        <input type="button" value="Submit">
    </form>
</body>
</html>
