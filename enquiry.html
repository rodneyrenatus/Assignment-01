<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Questions???</title>
</head>
<body>
    <h1>Have Questions??? Ask Away</h1>

    <form>
        <label for="fname">First Name:  </label>
        <input type="text" name="fname" id="fname", placeholder="Enter your First Name..." required> <br>

        <label for="lname">Last Name:  </label>
        <input type="text" name="lname" id="lname", placeholder="Enter your Last Name..." required> <br>

        <label for="user-email">Email Address: </label>
        <input type="email", id="user-email", name="user-email" placeholder="example@gmail.com", required><br>

        <label for="phone"> Phone Number: </label>
        <input type="tel", id="phone" name="phone" placeholder="012-3456789", required> <br>

        <label for="comments">Comments: </label> <br>
        <textarea name="comments" id="comments", rows="10" cols="50"></textarea>
    </form>
</body>
</html>
